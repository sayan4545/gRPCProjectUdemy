syntax = "proto3";
option java_package = "com.sayan.models.sec03";
package sec03;
option java_multiple_files = true;

message Email{
  string email = 1;
  string password = 2 ;
}

message Phone{
  int32 phone = 1 ;
  int32 code = 2 ;
}

message Credentials{
  oneof login_type{
    Email email = 1;
    Phone phone = 2;
  }
}