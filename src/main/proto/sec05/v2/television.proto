syntax = "proto3";
option java_package = "com.sayan.models.sec05.v2";
package sec05.v2;
option java_multiple_files = true;

message Television{
  optional string brand = 1;
  // changed year to model
  optional int32 model = 2;
  optional Type type = 3;
}

enum Type{
  HD = 0;
  LED = 1;
  OLED = 2;
  SMART = 3;
  CURVED = 4;
}