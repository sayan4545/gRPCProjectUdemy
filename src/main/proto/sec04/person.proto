syntax = "proto3";
option java_package = "com.sayan.models.sec04";
package sec04;
option java_multiple_files = true;

import "sec04/common/Address.proto";
import "sec04/common/Car.proto";


message Person{
  string name = 1;
  int32 age = 2;
  sec04.common.Car car = 3;
  sec04.common.Address address = 4;
}